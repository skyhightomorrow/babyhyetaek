<style>
  :root{
    --ink:#191f2e;--mut:#697588;--dim:#9aa4b2;--line:#eef0f4;--line2:#e4e7ee;
    --brand:#ff6b81;--brand-d:#e84e66;--brand-soft:#fff2f4;
    --accent:#7c6cf0;--accent-soft:#f1eefe;--ok:#12b886;
    --bg:#f7f8fa;--card:#fff;--radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .shell{max-width:560px;margin:0 auto;padding:0 16px 64px}
  a{color:var(--accent);text-decoration:none}

  /* 헤더/히어로 */
  header{padding:22px 4px 8px;display:flex;align-items:center;gap:8px}
  .logo{font-size:20px;font-weight:800;letter-spacing:-.02em}
  .logo b{color:var(--brand)}
  .hero{padding:14px 4px 20px}
  .hero .pill{display:inline-flex;align-items:center;gap:6px;background:var(--brand-soft);color:var(--brand-d);
    font-size:12.5px;font-weight:700;border-radius:999px;padding:6px 12px;margin-bottom:14px}
  .hero h1{font-size:25px;line-height:1.34;letter-spacing:-.02em;font-weight:800}
  .hero h1 .hl{background:linear-gradient(transparent 60%, #ffe1e6 60%)}
  .hero p{color:var(--mut);font-size:15px;margin-top:12px}

  /* 카드 공통 */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px;margin-bottom:14px;box-shadow:0 1px 2px rgba(20,30,60,.03)}

  /* 위저드 */
  .dots{display:flex;gap:6px;margin-bottom:20px}
  .dot{height:4px;flex:1;border-radius:2px;background:var(--line2)}
  .dot.on{background:var(--brand)}
  .q{font-size:21px;font-weight:800;letter-spacing:-.02em}
  .qsub{color:var(--mut);font-size:14px;margin:8px 0 20px}
  .sel{width:100%;font:inherit;font-size:16px;padding:15px 14px;border:1.5px solid var(--line2);
    border-radius:13px;background:#fff;color:var(--ink);margin-bottom:10px;appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' fill='none' stroke='%239aa4b2' stroke-width='2'><path d='M5 8l5 5 5-5'/></svg>");
    background-repeat:no-repeat;background-position:right 14px center}
  .sel:focus{outline:none;border-color:var(--brand)}
  .sel:disabled{background:#f5f6f8;color:var(--dim)}
  .choices{display:flex;flex-direction:column;gap:10px}
  .choice{font:inherit;font-size:16px;font-weight:600;text-align:left;padding:17px 16px;border-radius:13px;
    border:1.5px solid var(--line2);background:#fff;color:var(--ink);cursor:pointer;transition:.12s}
  .choice:hover{border-color:var(--brand)}
  .choice.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-d)}
  .wageWrap{margin-top:14px;padding-top:16px;border-top:1px dashed var(--line2)}
  .wageLbl{display:block;font-size:13px;color:var(--mut);margin-bottom:8px;font-weight:600}
  .wageInp{width:100%;font:inherit;font-size:17px;padding:14px;border:1.5px solid var(--line2);border-radius:13px}
  .wageInp:focus{outline:none;border-color:var(--brand)}
  .wagePrev{font-size:13px;color:var(--brand-d);font-weight:700;margin-top:8px;min-height:16px}

  .nav{display:flex;gap:10px;margin-top:24px}
  .btn{font:inherit;font-size:16px;font-weight:700;padding:15px;border-radius:13px;border:none;cursor:pointer;transition:.12s}
  .btn.primary{flex:1;background:var(--brand);color:#fff}
  .btn.primary:hover{background:var(--brand-d)}
  .btn.primary:disabled{background:#f0c4cc;cursor:not-allowed}
  .btn.ghost{background:#f1f3f6;color:var(--mut)}
  .btn.ghost:hover{background:#e8ebef}
  .btn.wide{width:100%;margin-top:4px}

  /* 결과 히어로 */
  .heroCard{background:linear-gradient(135deg,#fff5f6,#f3f0fe);border-color:#f3dfe4}
  .freshBadge{display:inline-block;background:#fff;border:1px solid #ffd7de;color:var(--brand-d);
    font-size:12px;font-weight:700;border-radius:999px;padding:5px 11px;margin-bottom:12px}
  .heroLbl{font-size:13.5px;color:var(--mut);font-weight:600}
  .heroNum{font-size:40px;font-weight:800;letter-spacing:-.03em;color:var(--brand-d);margin:4px 0 8px;line-height:1.1}
  .heroCap{font-size:14px;color:var(--ink)}
  .heroCap b{color:var(--brand-d)}

  /* 섹션 */
  .secTitle{font-size:16px;font-weight:800;letter-spacing:-.01em;margin-bottom:14px}

  /* 타임라인 */
  .timeline{display:flex;flex-direction:column}
  .tlRow{display:grid;grid-template-columns:96px 1fr auto;gap:10px;align-items:center;
    padding:13px 0;border-bottom:1px solid var(--line)}
  .tlRow:last-child{border-bottom:none}
  .tlWhen{font-size:12.5px;color:var(--mut);font-weight:700}
  .tlNm{font-size:15px;font-weight:700}
  .tlTag{font-size:10.5px;background:var(--accent-soft);color:var(--accent);border-radius:5px;padding:1px 6px;font-weight:700;vertical-align:middle}
  .tlNote{font-size:12px;color:var(--dim);margin-top:2px}
  .tlAmt{font-size:15px;font-weight:800;color:var(--ink);white-space:nowrap}
  .tlRow.once .tlAmt{color:var(--brand-d)}
  .tlRow.leave{background:#faf9ff;margin:0 -22px;padding:13px 22px}
  .tlRow.leave .tlAmt{color:var(--accent)}
  .srcNote{font-size:11.5px;color:var(--dim);margin-top:14px;line-height:1.55}

  /* 지자체 */
  .locList{display:flex;flex-direction:column;gap:11px}
  .locItem{padding:14px;background:#fafbfc;border:1px solid var(--line);border-radius:12px}
  .locNm{font-size:14.5px;font-weight:700}
  .locAmt{font-size:13px;color:var(--brand-d);font-weight:600;margin-top:5px;line-height:1.5}
  .locDgst{font-size:12.5px;color:var(--mut);margin-top:5px;line-height:1.5}
  .locMeta{font-size:11.5px;color:var(--dim);margin-top:7px}
  .moreNote{font-size:12.5px;color:var(--dim);text-align:center;margin-top:12px}

  /* 슬롯 */
  .prepChips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .prepChip{font-size:12.5px;background:#fff6ed;color:#c9691a;border:1px solid #ffe4cc;border-radius:999px;padding:7px 12px;font-weight:600}
  .coupangCard{background:linear-gradient(135deg,#fffaf3,#fff);border-color:#f5e6d4}
  .insCard{background:linear-gradient(135deg,#f2fbf8,#fff);border-color:#d9f0e8}
  .slotTag{font-size:11px;color:var(--dim);border:1px dashed var(--line2);border-radius:8px;
    padding:8px;text-align:center;background:#fff}
  .adSlot{border:1px dashed var(--line2);border-radius:12px;padding:20px;text-align:center;
    color:var(--dim);font-size:12px;background:#fbfbfc;margin-bottom:14px}

  .disclaimer{font-size:11.5px;color:var(--dim);line-height:1.6;margin-top:18px;padding:0 4px}
  /* 예시 지원금 */
  .exWrap{margin-top:6px}
  .exTitle{font-size:15px;font-weight:800;margin:22px 4px 4px}
  .exSub{font-size:12.5px;color:var(--dim);margin:0 4px 14px}
  .exCards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .exCard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 14px;text-align:center}
  .exCard .lbl{font-size:12.5px;color:var(--mut);font-weight:600}
  .exCard .num{font-size:21px;font-weight:800;color:var(--brand-d);letter-spacing:-.02em;margin-top:4px}
  .exCard .note{font-size:11px;color:var(--dim);margin-top:3px}
  .exTable{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 16px;margin-bottom:8px}
  .exRow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .exRow:last-child{border-bottom:none}
  .exRow .k{color:var(--ink);font-weight:600}
  .exRow .v{color:var(--brand-d);font-weight:700;text-align:right;white-space:nowrap}
  .exRegionNote{font-size:12.5px;color:var(--mut);background:#fff7f8;border:1px solid #ffe1e6;border-radius:12px;padding:13px 15px;line-height:1.6}
  .exScenario{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
  .exScenario .stag{display:inline-block;font-size:11.5px;font-weight:700;border-radius:999px;padding:4px 10px;margin-bottom:8px}
  .exScenario.low .stag{background:#eef1f6;color:#697588}
  .exScenario.high .stag{background:var(--brand-soft);color:var(--brand-d)}
  .exScenario .cond{font-size:12px;color:var(--dim);margin-bottom:2px}
  .exScenario .big{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:2px 0 10px}
  .exScenario.low .big{color:#4a5468}
  .exScenario.high .big{color:var(--brand-d)}
  .exBd{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--line);padding-top:8px}
  .exBd .r{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;color:var(--mut)}
  .exBd .r b{color:var(--ink);font-weight:600}
  /* 결과 구성 breakdown */
  .bdList{display:flex;flex-direction:column}
  .bdRow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
  .bdRow:last-of-type{border-bottom:none}
  .bdRow .bdL{min-width:0}
  .bdRow .bdNm{font-size:14.5px;font-weight:700}
  .bdRow .bdNm a{color:var(--brand-d);text-decoration:none}
  .bdRow .bdNm a::after{content:" ›";color:var(--brand)}
  .bdRow .bdSub{font-size:12px;color:var(--dim);margin-top:2px}
  .bdRow .bdAmt{font-size:15px;font-weight:800;white-space:nowrap}
  .bdTotal{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-top:14px;border-top:2px solid var(--line2)}
  .bdTotal .k{font-size:14px;font-weight:700}
  .bdTotal .v{font-size:19px;font-weight:800;color:var(--brand-d)}
  .bdRow .bdWhen{font-size:12px;color:var(--mut);margin-top:5px}
  .bdRow .bdWhere{font-size:12px;color:var(--dim);margin-top:2px}
  /* 국가/지역 구분 배지 */
  .secBadge{display:inline-block;font-size:11px;font-weight:800;border-radius:6px;padding:4px 9px;margin-bottom:10px;letter-spacing:.02em}
  .secBadge.nat{background:#eef0fe;color:#5a4fa8}
  .secBadge.local{background:#fff1e8;color:#c9691a}
  /* 통상임금 슬라이더 (HECS 패턴) */
  .wageVal{text-align:center;font-size:27px;font-weight:800;color:var(--brand-d);letter-spacing:-.02em;margin-top:2px}
  .wageSlider{-webkit-appearance:none;appearance:none;width:100%;height:5px;margin:14px 0 2px;padding:0;background:var(--line2);border-radius:999px;cursor:pointer}
  .wageSlider:focus{outline:none}
  .wageSlider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:var(--brand);border:3px solid #fff;box-shadow:0 1px 5px rgba(232,78,102,.45);cursor:pointer}
  .wageSlider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--brand);border:3px solid #fff;box-shadow:0 1px 5px rgba(232,78,102,.45);cursor:pointer}
  .wageRange{display:flex;justify-content:space-between;font-size:11.5px;color:var(--dim);margin-top:3px}
  footer{text-align:center;font-size:12px;color:var(--dim);padding:24px 0 0;border-top:1px solid var(--line);margin-top:8px}
  footer a{color:var(--mut)}
</style>
